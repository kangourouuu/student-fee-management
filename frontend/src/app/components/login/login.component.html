<div class="login-wrapper">
  <div class="neu-flat login-card">
    <div class="login-header">
      <div class="logo-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0284c7" stroke-width="2">
          <path d="M12 14l9-5-9-5-9 5 9 5z"/>
          <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 01-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
        </svg>
      </div>
      <h2 class="title">Đăng nhập Hệ thống</h2>
      <p class="subtitle">Quản lý Học phí & Điểm danh Học sinh</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Tên đăng nhập</label>
        <input 
          type="text" 
          class="neumorphic-inset form-input" 
          [(ngModel)]="username" 
          name="username"
          placeholder="Nhập tên đăng nhập..."
          required
        />
      </div>

      <div class="form-group-lg">
        <label class="form-label">Mật khẩu</label>
        <input 
          type="password" 
          class="neumorphic-inset form-input" 
          [(ngModel)]="password" 
          name="password"
          placeholder="Nhập mật khẩu..."
          required
        />
      </div>

      @if (errorMessage()) {
        <div class="error-banner">
          {{ errorMessage() }}
        </div>
      }

      <button 
        type="submit" 
        class="neumorphic-button submit-btn" 
        [disabled]="loading()"
      >
        {{ loading() ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>
    </form>
  </div>
</div>
